name: VfB Vorverkaufs-Kalender aktualisieren

on:
  schedule:
    # Alle 6 Stunden. Zeiten in UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # erlaubt manuellen Start über den "Actions"-Tab

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Scraper ausführen
        run: python scraper.py

      - name: Änderungen committen (falls vorhanden)
        run: |
          git config user.name "vfb-ticket-kalender-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/vfb-vorverkauf.ics
          git diff --cached --quiet || git commit -m "Vorverkaufstermine aktualisiert"
          git push
