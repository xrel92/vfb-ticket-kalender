name: VfB Ticketkalender aktualisieren

on:
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python-Pakete installieren
        run: pip install -r requirements.txt

      - name: Chromium installieren
        run: python -m playwright install --with-deps chromium

      - name: Kalender aktualisieren
        run: python update_calendar.py

      - name: Änderungen speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/vfb-ticketkalender.ics
          git diff --cached --quiet || git commit -m "Kalender aktualisieren"
          git push
